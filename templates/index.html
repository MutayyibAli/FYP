<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Brain Tumor Segmentation Web App</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --primary-color: #2563eb;
        --primary-hover: #1d4ed8;
        --secondary-color: #10b981;
        --bg-color: #f1f5f9;
        --card-bg: #ffffff;
        --text-dark: #1e293b;
        --text-muted: #64748b;
        --border-color: #e2e8f0;
      }

      body {
        font-family: "Inter", sans-serif;
        background-color: var(--bg-color);
        color: var(--text-dark);
        margin: 0;
        padding: 40px 20px;
        display: flex;
        flex-direction: column;
        align-items: center;
      }

      /* Header Styling */
      .page-header {
        text-align: center;
        margin-bottom: 40px;
      }
      .page-header h1 {
        font-size: 2.5rem;
        color: #0f172a;
        margin: 0 0 10px 0;
        font-weight: 700;
        letter-spacing: -0.5px;
      }
      .page-header p {
        color: var(--text-muted);
        font-size: 1.1rem;
        margin: 0;
      }

      /* Card Container */
      .container {
        width: 100%;
        max-width: 800px;
      }
      .card {
        background: var(--card-bg);
        padding: 30px;
        border-radius: 16px;
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
        margin-bottom: 25px;
        border: 1px solid var(--border-color);
      }
      .card h2 {
        margin-top: 0;
        font-size: 1.5rem;
        border-bottom: 2px solid var(--bg-color);
        padding-bottom: 15px;
        margin-bottom: 25px;
      }

      /* File Upload Grid */
      .file-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 20px;
        margin-bottom: 25px;
      }
      .file-group {
        background: #f8fafc;
        border: 2px dashed #cbd5e1;
        border-radius: 10px;
        padding: 15px;
        text-align: center;
        transition: all 0.3s ease;
      }
      .file-group:hover {
        border-color: var(--primary-color);
        background: #eff6ff;
      }
      .file-group.optional {
        grid-column: span 2;
        border-style: solid;
        border-color: #e2e8f0;
      }

      label {
        font-weight: 600;
        display: block;
        margin-bottom: 8px;
        color: #334155;
        font-size: 0.95rem;
      }
      input[type="file"] {
        font-size: 0.85rem;
        color: var(--text-muted);
        width: 100%;
      }

      /* Custom file input text */
      input[type="file"]::file-selector-button {
        background-color: #e2e8f0;
        color: #475569;
        border: none;
        padding: 6px 12px;
        border-radius: 6px;
        cursor: pointer;
        margin-right: 10px;
        font-weight: 600;
        transition: 0.2s;
      }
      input[type="file"]::file-selector-button:hover {
        background-color: #cbd5e1;
      }

      /* Buttons */
      button {
        background-color: var(--primary-color);
        color: white;
        border: none;
        padding: 14px 24px;
        border-radius: 8px;
        cursor: pointer;
        font-size: 1rem;
        font-weight: 600;
        width: 100%;
        transition:
          background-color 0.3s,
          transform 0.1s;
        box-shadow: 0 4px 6px rgba(37, 99, 235, 0.2);
      }
      button:hover {
        background-color: var(--primary-hover);
        transform: translateY(-1px);
      }
      button:disabled {
        background-color: #94a3b8;
        cursor: not-allowed;
        box-shadow: none;
        transform: none;
      }

      #analyzeBtn {
        background-color: var(--secondary-color);
        box-shadow: 0 4px 6px rgba(16, 185, 129, 0.2);
      }
      #analyzeBtn:hover {
        background-color: #059669;
      }

      /* Status Messages */
      .status-msg {
        font-weight: 600;
        margin-top: 15px;
        text-align: center;
        padding: 10px;
        border-radius: 6px;
      }
      .error {
        color: #dc2626;
        background: #fee2e2;
        border: 1px solid #f87171;
      }
      .success {
        color: #166534;
        background: #dcfce7;
        border: 1px solid #86efac;
      }

      /* Progress Bar */
      .progress-container {
        width: 100%;
        background-color: #e2e8f0;
        border-radius: 8px;
        margin-top: 20px;
        display: none;
        overflow: hidden;
        height: 24px;
      }
      .progress-bar {
        width: 0%;
        height: 100%;
        background-color: var(--secondary-color);
        text-align: center;
        line-height: 24px;
        color: white;
        font-weight: bold;
        font-size: 0.85rem;
        transition: width 0.4s ease;
        background-image: linear-gradient(
          45deg,
          rgba(255, 255, 255, 0.15) 25%,
          transparent 25%,
          transparent 50%,
          rgba(255, 255, 255, 0.15) 50%,
          rgba(255, 255, 255, 0.15) 75%,
          transparent 75%,
          transparent
        );
        background-size: 1rem 1rem;
        animation: progress-animation 1s linear infinite;
      }

      @keyframes progress-animation {
        from {
          background-position: 1rem 0;
        }
        to {
          background-position: 0 0;
        }
      }

      /* Result Image */
      #result-container {
        display: none;
        text-align: center;
      }
      #result-image {
        max-width: 100%;
        border-radius: 10px;
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        margin-top: 15px;
      }

      @media (max-width: 600px) {
        .file-grid {
          grid-template-columns: 1fr;
        }
        .file-group.optional {
          grid-column: 1;
        }
      }
    </style>
  </head>
  <body>
    <div class="page-header">
      <h1>Brain Tumor Image Segmentation</h1>
      <p>Upload multi-modal MRI scans to generate a predicted tumor mask</p>
    </div>

    <div class="container">
      <div class="card">
        <h2>1. Upload MRI Modalities</h2>
        <form id="uploadForm">
          <div class="file-grid">
            <div class="file-group">
              <label>FLAIR (Required)</label>
              <input
                type="file"
                id="flair"
                name="flair"
                accept=".nii.gz, .nii"
                required
              />
            </div>
            <div class="file-group">
              <label>T1 (Required)</label>
              <input
                type="file"
                id="t1"
                name="t1"
                accept=".nii.gz, .nii"
                required
              />
            </div>
            <div class="file-group">
              <label>T1ce (Required)</label>
              <input
                type="file"
                id="t1ce"
                name="t1ce"
                accept=".nii.gz, .nii"
                required
              />
            </div>
            <div class="file-group">
              <label>T2 (Required)</label>
              <input
                type="file"
                id="t2"
                name="t2"
                accept=".nii.gz, .nii"
                required
              />
            </div>
            <div class="file-group optional">
              <label>Ground Truth (Optional)</label>
              <input
                type="file"
                id="ground_truth"
                name="ground_truth"
                accept=".nii.gz, .nii"
              />
            </div>
          </div>
          <button type="button" id="uploadBtn" onclick="uploadData()">
            Securely Upload Files
          </button>
          <div id="uploadMessage"></div>
        </form>
      </div>

      <div class="card" id="analyzeCard" style="display: none">
        <h2>2. Run Segmentation</h2>
        <button type="button" id="analyzeBtn" onclick="startAnalysis()">
          Analyze Image with nnU-Net
        </button>

        <div class="progress-container" id="progressContainer">
          <div class="progress-bar" id="progressBar">0%</div>
        </div>
        <div id="analyzeMessage"></div>
      </div>

      <div class="card" id="result-container">
        <h2>3. Segmentation Result</h2>
        <img id="result-image" src="" alt="Predicted Output Mask" />
      </div>
    </div>

    <script>
      async function uploadData() {
        const form = document.getElementById("uploadForm");
        const formData = new FormData(form);
        const messageDiv = document.getElementById("uploadMessage");
        const analyzeCard = document.getElementById("analyzeCard");

        // Client-side validation
        if (
          !formData.get("flair").name ||
          !formData.get("t1").name ||
          !formData.get("t1ce").name ||
          !formData.get("t2").name
        ) {
          messageDiv.className = "status-msg error";
          messageDiv.innerText =
            "Error: All 4 modalities (FLAIR, T1, T1ce, T2) must be provided.";
          return;
        }

        messageDiv.className = "status-msg";
        messageDiv.style.color = "var(--text-muted)";
        messageDiv.innerText = "Uploading files... Please wait.";
        document.getElementById("uploadBtn").disabled = true;

        try {
          const response = await fetch("/upload", {
            method: "POST",
            body: formData,
          });

          const result = await response.json();

          if (response.ok) {
            messageDiv.className = "status-msg success";
            messageDiv.innerText = result.message;
            analyzeCard.style.display = "block"; // Reveal Analyze section

            // Smooth scroll to analyze button
            analyzeCard.scrollIntoView({ behavior: "smooth" });
          } else {
            messageDiv.className = "status-msg error";
            messageDiv.innerText = result.error;
          }
        } catch (error) {
          messageDiv.className = "status-msg error";
          messageDiv.innerText =
            "Upload failed. Check the console for details.";
        } finally {
          document.getElementById("uploadBtn").disabled = false;
        }
      }

      async function startAnalysis() {
        const analyzeBtn = document.getElementById("analyzeBtn");
        const progressContainer = document.getElementById("progressContainer");
        const progressBar = document.getElementById("progressBar");
        const analyzeMessage = document.getElementById("analyzeMessage");
        const resultContainer = document.getElementById("result-container");
        const resultImage = document.getElementById("result-image");

        // Reset UI for processing
        analyzeBtn.disabled = true;
        resultContainer.style.display = "none";
        progressContainer.style.display = "block";
        analyzeMessage.className = "status-msg";
        analyzeMessage.style.color = "var(--text-muted)";
        analyzeMessage.innerText =
          "Running inference model... This may take a moment.";

        // Fake progress animation
        let progress = 0;
        let interval = setInterval(() => {
          if (progress < 90) {
            progress += Math.floor(Math.random() * 15) + 5;
            if (progress > 90) progress = 90; // Cap at 90% until server responds
            progressBar.style.width = progress + "%";
            progressBar.innerText = progress + "%";
          }
        }, 18000); // Increment every 18 seconds to simulate long processing time

        try {
          // Call backend endpoint
          const response = await fetch("/analyze", { method: "POST" });
          const result = await response.json();

          clearInterval(interval);

          if (response.ok) {
            progressBar.style.width = "100%";
            progressBar.innerText = "100%";

            setTimeout(() => {
              analyzeMessage.className = "status-msg success";
              analyzeMessage.innerText = "Analysis Complete!";
              resultImage.src = result.image_url;
              resultContainer.style.display = "block";
              resultContainer.scrollIntoView({ behavior: "smooth" });
            }, 500);
          } else {
            progressBar.style.backgroundColor = "#dc2626"; // Turn red on error
            analyzeMessage.className = "status-msg error";
            analyzeMessage.innerText = `Analysis Error: ${result.error}`;
          }
        } catch (error) {
          clearInterval(interval);
          progressBar.style.backgroundColor = "#dc2626";
          analyzeMessage.className = "status-msg error";
          analyzeMessage.innerText =
            "Failed to reach the server. Make sure Flask is running.";
        } finally {
          analyzeBtn.disabled = false;
        }
      }
    </script>
  </body>
</html>
